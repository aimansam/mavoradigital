server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Long-term cache for hashed assets (_astro/ folder)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Sitemap and robots — short cache
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # All routes — serve HTML files or 404
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
}
